apiVersion: batch/v1
kind: CronJob
metadata:
  name: vdv-pkpass-uic-certs
  namespace: q-personal
  labels:
    app: vdv-pkpass
    part: uic-certs
spec:
  schedule: "0 4 * * *"
  jobTemplate:
    spec:
      template:
        metadata:
          annotations:
            cni.projectcalico.org/ipv6pools: "[\"default-ipv6-ippool\"]"
          labels:
            app: vdv-pkpass
            class: cron
            part: uic-certs
        spec:
          restartPolicy: OnFailure
          volumes:
            - name: certs
              secret:
                secretName: vdv-pkpass-certs
            - name: mapkit
              secret:
                secretName: vdv-pkpass-mapkit
            - name: google-creds
              secret:
                secretName: vdv-pkpass-google-creds
          containers:
            - name: uic-certs
              image: theenbyperor/vdv-pkpass-django:(version)
              imagePullPolicy: IfNotPresent
              command: ["sh", "-c", "python3 manage.py download-uic-certs"]
              volumeMounts:
                - mountPath: "/google-creds"
                  name: google-creds
                - mountPath: "/certs"
                  name: certs
                - mountPath: "/mapkit"
                  name: mapkit
              envFrom:
                - configMapRef:
                    name: vdv-pkpass
                - secretRef:
                    name: vdv-pkpass-db-creds
                  prefix: "DB_"
                - secretRef:
                    name: vdv-pkpass-email
                  prefix: "EMAIL_"
                - secretRef:
                    name: vdv-pkpass-celery
                  prefix: "CELERY_"
                - secretRef:
                    name: vdv-pkpass-django-secret
                - secretRef:
                    name: vdv-pkpass-s3
                - secretRef:
                    name: vdv-pkpass-nr
                - secretRef:
                    name: vdv-pkpass-sncb
                - secretRef:
                    name: vdv-pkpass-raileasy
                - secretRef:
                    name: vdv-pkpass-wallet-passes
                - secretRef:
                    name: vdv-pkpass-hzpp
---
